<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Encontre dicas para fortalecer seu relacionamento, melhorar a comunicação e viver de forma mais harmoniosa com seu parceiro(a).">
    <title>Dicas de Relacionamento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #FF6347; /* Cor vermelha */
            color: white;
            text-align: center;
            padding: 1em 0;
        }
        header img {
            width: 100%; /* A imagem vai ocupar 100% da largura do container */
            height: auto; /* A altura será ajustada automaticamente */
            max-width: 1200px; /* Limita a largura máxima */
            margin: 0 auto; /* Centraliza a imagem */
        }
        section {
            padding: 20px;
            margin: 10px;
            background-color: white;
            border-radius: 8px;
        }
        h2 {
            color: #333;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            background: #FFDDC1; /* Fundo vermelho claro */
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        li:hover {
            background-color: #FF6347; /* Cor do fundo muda ao passar o mouse */
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #FF6347; /* Cor vermelha */
            color: white;
        }
        a {
            color: #FF6347;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        button {
            background-color: #FF6347;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e5533b;
        }
        
        /* Responsividade */
        @media (max-width: 768px) {
            header img {
                width: 100%;
                height: auto;
            }
            section {
                padding: 15px;
                margin: 5px;
            }
            button {
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>

<header>
    <img src="imagemrelacionamento.jpeg" alt="Casal feliz, dicas de relacionamento">
    <h1>Dicas para um Relacionamento Saudável</h1>
</header>

<!-- O resto do conteúdo do site aqui... -->

</body>
</html>
